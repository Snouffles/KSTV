<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00:00 - Timer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #e1d6d6;
        }
/* Float (PiP) Toggle Button */
        #pip-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.9rem;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: #9C27B0;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #pip-btn:hover {
            background-color: #7B1FA2;
        }
        /* 20 Circles Container */
        .circle-container {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #ddd; /* Off state */
            transition: background-color 0.3s ease;
        }

        /* Solid Lit State for remaining minutes */
        .circle.lit {
            background-color: #4CAF50;
            box-shadow: 0 0 8px #4CAF50;
        }

        /* Blinking State for the active minute */
        .circle.blink {
            background-color: #4CAF50;
            box-shadow: 0 0 8px #4CAF50;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.2; }
        }

        /* Main Display */
        h1 {
            font-size: 5rem;
            margin: 0 0 30px 0;
            font-variant-numeric: tabular-nums;
        }

        /* Time Buttons */
        .buttons-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .time-btn {
            font-size: 1.2rem;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background-color: #2196F3;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }
        #time-btn-1{
            background-color: #1e00ff;
            color: white;
        }
        #time-btn-2{
            background-color: #4CAF50;
            color: white;
        }
        #time-btn-3{
            background-color: #ffff00;
            color: black;
        }
        #time-btn-4{
            background-color: #e40000;
            color: white;
        }
        .time-btn:hover:not(:disabled) {
            background-color: #000000;
            color: #ddd;
        }

        .time-btn:disabled {
            background-color: #90CAF9;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Stop Button */
        #stop-btn {
            font-size: 1.2rem;
            padding: 10px 40px;
            border: none;
            border-radius: 8px;
            background-color: #f44336;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #stop-btn:hover {
            background-color: #d32f2f;
        }

        #stop-btn:disabled {
            background-color: #ef9a9a;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <button id="pip-btn" onclick="togglePiP()">Float (PiP)</button>
    <div class="circle-container" id="circle-container"></div>

    <h1 id="time-display">00:00</h1>

    <div class="buttons-container">
        <button class="time-btn" id="time-btn-1" onclick="startTimer(5)">5</button>
        <button class="time-btn" id="time-btn-2" onclick="startTimer(10)">10</button>
        <button class="time-btn" id="time-btn-3" onclick="startTimer(15)">15</button>
        <button class="time-btn" id="time-btn-4" onclick="startTimer(20)">20</button>
    </div>

    <button id="stop-btn" onclick="stopTimer()" disabled>Stop</button>

    <script>
        
        // DOM Elements
        const circleContainer = document.getElementById('circle-container');
        const display = document.getElementById('time-display');
        const timeButtons = document.querySelectorAll('.time-btn');
        const stopBtn = document.getElementById('stop-btn');

        // Timer Variables
        let interval;
        let totalSeconds = 0;
        let currentSeconds = 0;

        // Picture-in-Picture Variables
        const pipCanvas = document.createElement('canvas');
        const pipVideo = document.createElement('video');
        const ctx = pipCanvas.getContext('2d');
        let isPiP = false;
        let pipDrawInterval;

        // Set up the hidden PiP elements
        pipCanvas.width = 400;
        pipCanvas.height = 200;
        pipVideo.muted = true;

        // Listen for PiP window closing
        pipVideo.addEventListener('leavepictureinpicture', () => {
            isPiP = false;
            clearInterval(pipDrawInterval);
        });

        // Initialize exactly 20 HTML circles
        const totalCircles = 20;
        for (let i = 0; i < totalCircles; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            circleContainer.appendChild(circle);
        }
        const circles = document.querySelectorAll('.circle');

        // Start Timer Logic
        function startTimer(minutes) {
            totalSeconds = minutes * 60;
            currentSeconds = totalSeconds;

            timeButtons.forEach(btn => btn.disabled = true);
            stopBtn.disabled = false;

            updateDisplay();
            updateCircles();
            if (isPiP) drawPiP(); // Force a draw update
            clearInterval(interval);

            interval = setInterval(() => {
                currentSeconds--;

                if (currentSeconds <= 0) {
                    clearInterval(interval);
                    currentSeconds = 0;
                    resetButtons();
                    document.title = "Time's up!";
                }

                updateDisplay();
                updateCircles();
                
                // Force an update into the PiP if the browser is throttling intervals
                if (isPiP) drawPiP(); 
            }, 1000);
        }

        // Stop Timer Logic
        function stopTimer() {
            if (confirm("Are you sure you want to stop the timer?")) {
                clearInterval(interval);
                currentSeconds = 0;
                totalSeconds = 0;
                
                updateDisplay();
                updateCircles();
                resetButtons();
                document.title = "00:00 - Timer";
                if (isPiP) drawPiP();
            }
        }

        function updateDisplay() {
            const minutes = Math.floor(currentSeconds / 60);
            const seconds = currentSeconds % 60;
            const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            display.textContent = formattedTime;
            if (currentSeconds > 0) document.title = `${formattedTime} - Timer Running`;
        }

        function updateCircles() {
            const activeMinute = Math.ceil(currentSeconds / 60);

            circles.forEach((circle, index) => {
                const circleMinute = index + 1;
                circle.classList.remove('lit', 'blink');

                if (currentSeconds === 0) return;

                if (circleMinute === activeMinute) {
                    circle.classList.add('blink');
                } else if (circleMinute < activeMinute) {
                    circle.classList.add('lit');
                }
            });
        }

        function resetButtons() {
            timeButtons.forEach(btn => btn.disabled = false);
            stopBtn.disabled = true;
        }

        // ==========================================
        // PICTURE-IN-PICTURE (PiP) LOGIC FIX
        // ==========================================
        async function togglePiP() {
            if (document.pictureInPictureElement) {
                document.exitPictureInPicture();
                return;
            }

            // 1. Mark as active and start drawing immediately 
            // so the video stream isn't blank when PiP opens.
            isPiP = true;
            drawPiP(); 
            
            // 2. Use setInterval instead of requestAnimationFrame so it runs in background tabs
            if (pipDrawInterval) clearInterval(pipDrawInterval);
            pipDrawInterval = setInterval(drawPiP, 50); // 20 frames per second

            // 3. Start the video stream
            pipVideo.srcObject = pipCanvas.captureStream(30);
            
            try {
                await pipVideo.play();
                await pipVideo.requestPictureInPicture();
            } catch (error) {
                alert("Your browser does not support Picture-in-Picture or it was blocked.");
                isPiP = false;
                clearInterval(pipDrawInterval);
            }
        }

        // Draw the timer onto the hidden canvas
        function drawPiP() {
            if (!isPiP) return;
            
            // Black Background
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, pipCanvas.width, pipCanvas.height);

            // Draw 20 Circles
            const activeMinute = Math.ceil(currentSeconds / 60);
            const circleRadius = 6;
            const gap = 16; 
            const totalWidth = (totalCircles * gap) - (gap - circleRadius * 2);
            const startX = (pipCanvas.width - totalWidth) / 2 + 5;

            for (let i = 0; i < totalCircles; i++) {
                const circleMinute = i + 1;
                let color = 'white'; // Default white for circle

                if (currentSeconds > 0) {
                    if (circleMinute === activeMinute) {
                        // Math trick to make it blink every half second
                        const isBlinkingOn = Math.floor(Date.now() / 500) % 2 === 0;
                        color = isBlinkingOn ? '#4CAF50' : 'white';
                    } else if (circleMinute < activeMinute) {
                        color = '#4CAF50'; //blink green
                    }
                }

                ctx.beginPath();
                ctx.arc(startX + (i * gap), 50, circleRadius, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                
                // Add a glow effect if lit
                if (color === '#4CAF50') {
                    ctx.shadowColor = '#4CAF50';
                    ctx.shadowBlur = 6;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw Text Timer
            const minutes = Math.floor(currentSeconds / 60);
            const seconds = currentSeconds % 60;
            const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 70px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(formattedTime, pipCanvas.width / 2, pipCanvas.height / 2 + 30);
        }
    
    </script>
</body>
</html>
